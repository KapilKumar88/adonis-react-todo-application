  # ─── Todos ─────────────────────────────────────────────────────────────────────

  /todos:
    get:
      tags:
        - Todos
      summary: List todos for the authenticated user (paginated)
      operationId: listTodos
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_progress, completed, backlog, icebox]
          description: Filter by status
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
          description: Filter by priority
        - in: query
          name: search
          schema:
            type: string
          description: Search in title and description
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [title, description, priority, status, dueDate, createdAt]
          description: Sort by field
        - in: query
          name: sortDirection
          schema:
            type: string
            enum: [asc, desc]
          description: Sort direction
      responses:
        "200":
          description: Paginated list of todos
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
