openapi: 3.1.0
info:
  title: Todo Application API
  version: 1.0.0
  description: REST API for the Adonis-React Todo Application

servers:
  - url: /api/v1
    description: API v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Opaque

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        fullName:
          type: string
          nullable: true
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        initials:
          type: string
          example: JD
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: oat_XXXXXXXXXX

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              rule:
                type: string
              field:
                type: string

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: editor
        displayName:
          type: string
          nullable: true
          example: Editor
        description:
          type: string
          nullable: true
          example: Can edit content
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RoleBody:
      type: object
      required:
        - name
        - displayName
      properties:
        name:
          type: string
          maxLength: 50
          example: editor
          description: Only letters and underscores allowed
        displayName:
          type: string
          maxLength: 100
          example: Editor
        description:
          type: string
          maxLength: 500
          nullable: true
          example: Can edit content

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        perPage:
          type: integer
        currentPage:
          type: integer
        lastPage:
          type: integer
        firstPage:
          type: integer

paths:
  /admin/login:
    post:
      tags:
        - Admin_Authentication
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  example: secret123
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /auth/signup:
    post:
      tags:
        - Authentication
      summary: Register a new account
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - passwordConfirmation
              properties:
                fullName:
                  type: string
                  nullable: true
                  example: John Doe
                email:
                  type: string
                  format: email
                  maxLength: 254
                  example: john@example.com
                password:
                  type: string
                  minLength: 8
                  maxLength: 32
                  example: secret123
                passwordConfirmation:
                  type: string
                  minLength: 8
                  maxLength: 32
                  example: secret123
      responses:
        "200":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  example: secret123
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout and revoke current access token
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized

  /account/profile:
    get:
      tags:
        - Account
      summary: Get the authenticated user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /admin/roles:
    get:
      tags:
        - Admin_Roles
      summary: List all roles (paginated)
      operationId: listRoles
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Paginated list of roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
        "401":
          description: Unauthorized
    post:
      tags:
        - Admin_Roles
      summary: Create a new role
      operationId: createRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleBody"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          description: Unauthorized
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /admin/roles/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        example: 1
    get:
      tags:
        - Admin_Roles
      summary: Get a single role
      operationId: getRole
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          description: Unauthorized
        "404":
          description: Role not found
    put:
      tags:
        - Admin_Roles
      summary: Update a role
      operationId: updateRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleBody"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          description: Unauthorized
        "404":
          description: Role not found
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
    delete:
      tags:
        - Admin_Roles
      summary: Delete a role
      operationId: deleteRole
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
        "404":
          description: Role not found
